services:
  postgres_container:
    image: postgres:16-alpine
    container_name: postgres_container
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5431:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 3s
      retries: 2

  student_api:
    build: .
    image: student_api:v1.0.0
    container_name: student_app
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      postgres_container:
        condition: service_healthy

  migrate:
    build: .
    image: db_migrate:v1
    container_name: db_migrate_container_v1
    env_file:
      - .env
    command: npm run migrate #CMD
    depends_on:
      postgres_container:
        condition: service_healthy

volumes:
  postgres_data:
