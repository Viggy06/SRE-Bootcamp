services:
  postgres_container:
    image: postgres:16-alpine
    container_name: postgres-container
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 3s
      retries: 2

  student_api:
    build: .
    image: student_api:v1.0.0
    container_name: student_app
    ports:
      - "${PORT}:${PORT}"
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      postgres_container:
        condition: service_healthy

  migrate:
    build: .
    image: db_migrate:v1
    container_name: db_migrate_container:v1
    command: npm run migrate #CMD
    depends_on:
      postgres_container:
        condition: service_healthy

volumes:
  postgres_data: