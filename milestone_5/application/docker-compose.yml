services:
  postgres_container:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      retries: 5
      timeout: 3s
    restart: always

  student_api_1:
#    build: .
    image: captianvigg06/student-api-repo:1.0.1
    expose:
      -  "5000"
    command: sh -c "npx node-pg-migrate up && npm start"
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      postgres_container:
        condition: service_healthy
    restart: always

  student_api_2:
#    build: .
    image: captianvigg06/student-api-repo:1.0.1
    expose:
      -  "5000"
    command: npm start
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      postgres_container:
        condition: service_healthy
    restart: always

  nginx:
    image: nginx:alpine
    container_name: nginx_container
    ports:
      -  "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - student_api_1
      - student_api_2
    restart: always

volumes:
  postgres_data:
