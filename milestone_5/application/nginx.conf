events {}

http {
    upstream api_backend {
        server student_api_1:5000;
        server student_api_2:5000;
    }

    server {
        listen 80;

        location / {
            proxy_pass http://api_backend/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
